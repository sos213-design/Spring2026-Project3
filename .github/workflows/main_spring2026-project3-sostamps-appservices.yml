# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - Spring2026-Project3-sostamps-AppServices

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

        - name: Build with dotnet
        run: dotnet build ./Project3/Spring2026-Project3-sostamps/Spring2026-Project3-sostamps.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ./Project3/Spring2026-Project3-sostamps/Spring2026-Project3-sostamps.csprojj -c Release -o "${{env.DOTNET_ROOT}}/myapp"
        
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DE4E2E515A344798BE9A90714B1494EC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EC55449F9838432A9ABC60469611EE2E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4CA8D7CEFB0149589306A9BAC0B57E95 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Spring2026-Project3-sostamps-AppServices'
          slot-name: 'Production'
          package: .
          
